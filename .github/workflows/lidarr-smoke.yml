name: lidarr-smoke

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lidarr-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.x'
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y fuse3 ffmpeg
      - name: Build musefs (debug)
        run: cargo build -p musefs
      - name: Run the Lidarr real-instance e2e
        env:
          # Pinned multi-arch index digest for linuxserver/lidarr 3.1.0.4875-ls30
          # (the version the 2026-06-07 manual smoke validated). Bump deliberately
          # and re-run the dispatch acceptance when changing it.
          LIDARR_IMAGE: lscr.io/linuxserver/lidarr@sha256:b08b2194fa4ddb7f7ace9d1bfd82bd9b26f457d79aa70f42d923d2e15a820f0e
        run: ./scripts/lidarr-e2e/run-e2e.sh ./target/debug/musefs
