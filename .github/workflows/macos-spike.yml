name: macos-spike
on:
  push:
    branches: [macos-fuse-t-e2e]
    paths: ['.github/workflows/macos-spike.yml']
permissions:
  contents: read
jobs:
  spike:
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      PKG_CONFIG_PATH: /usr/local/lib/pkgconfig
    steps:
      - name: Install fuse-t
        run: |
          brew tap macos-fuse-t/homebrew-cask
          brew install --cask fuse-t
      - name: Install fuse.pc libfuse2 shim (alias -> libfuse-t)
        run: |
          sudo tee /usr/local/lib/pkgconfig/fuse.pc >/dev/null <<'PC'
          prefix=/usr/local
          libdir=${prefix}/lib
          includedir=${prefix}/include
          Name: fuse
          Description: fuse-t libfuse2 shim for fuser
          Version: 2.9.9
          Libs: -L${libdir} -lfuse-t
          Cflags: -I${includedir}/fuse -D_FILE_OFFSET_BITS=64
          PC
          pkg-config --modversion fuse
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - name: Build fuser 0.17 hello example (libfuse → fuse-t)
        run: |
          git clone --depth 1 --branch v0.17.0 https://github.com/cberner/fuser /tmp/fuser
          cd /tmp/fuser
          cargo build --example hello --features libfuse 2>&1 | tail -20
      - name: Isolation — does a stock fuser fs serve files through fuse-t?
        continue-on-error: true
        run: |
          MNT="$HOME/hellomnt"; mkdir -p "$MNT"
          # hello.rs mounts in the foreground and blocks; run it backgrounded.
          /tmp/fuser/target/debug/examples/hello "$MNT" &
          HPID=$!
          sleep 4
          echo "== ls mountpoint =="; ls -la "$MNT" || true
          echo "== stat hello.txt =="; stat "$MNT/hello.txt" || true
          echo "== cat hello.txt =="; cat "$MNT/hello.txt" || echo "CAT FAILED"
          echo "== mount table =="; mount | grep -iE 'fuse|nfs' || true
          umount "$MNT" 2>/dev/null || diskutil unmount "$MNT" 2>/dev/null || kill "$HPID" 2>/dev/null || true
      - name: Dump fuse-t logs (if any)
        if: always()
        run: |
          echo "== ~/Library/Logs/fuse-t =="
          ls -la "$HOME/Library/Logs/fuse-t" 2>/dev/null && cat "$HOME/Library/Logs/fuse-t/"* 2>/dev/null | tail -120 || echo "no fuse-t logs"
      - name: Inspect for stale mounts
        if: always()
        run: mount | grep -iE 'fuse|nfs' || echo "no fuse/nfs mounts left (good)"
