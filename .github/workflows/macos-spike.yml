name: macos-spike
on:
  push:
    branches: [macos-fuse-t-e2e]
    paths: ['.github/workflows/macos-spike.yml']
permissions:
  contents: read
jobs:
  spike:
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      PKG_CONFIG_PATH: /usr/local/lib/pkgconfig
      DYLD_FALLBACK_LIBRARY_PATH: /usr/local/lib:/usr/lib
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Install fuse-t
        run: |
          brew tap macos-fuse-t/homebrew-cask
          brew install --cask fuse-t
      - name: Install fuse.pc libfuse2 shim (with rpath)
        run: |
          sudo tee /usr/local/lib/pkgconfig/fuse.pc >/dev/null <<'PC'
          prefix=/usr/local
          libdir=${prefix}/lib
          includedir=${prefix}/include
          Name: fuse
          Description: fuse-t libfuse2 shim for fuser
          Version: 2.9.9
          Libs: -L${libdir} -Wl,-rpath,${libdir} -lfuse-t
          Cflags: -I${includedir}/fuse -D_FILE_OFFSET_BITS=64
          PC
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Build musefs-fuse (Approach B, libfuse → fuse-t)
        run: |
          sed -i '' 's/"macos-no-mount"/"libfuse"/' musefs-fuse/Cargo.toml
          cargo build -p musefs-fuse 2>&1 | tail -15
      - name: Run one mount test and capture fuse-t protocol log
        continue-on-error: true
        run: |
          export TMPDIR="$HOME/spiketmp"; mkdir -p "$TMPDIR"
          cargo test -p musefs-fuse --test mount end_to_end_read_through_mount \
            -- --ignored --nocapture --test-threads=1 2>&1 | tail -40 || true
      - name: Dump fuse-t logs
        if: always()
        run: |
          echo "== fuse-t.log =="; cat "$HOME/Library/Logs/fuse-t/fuse-t.log" 2>/dev/null | tail -120 || echo none
          echo "== fuse-t.err =="; cat "$HOME/Library/Logs/fuse-t/fuse-t.err" 2>/dev/null | tail -40 || echo none
      - name: Inspect for stale mounts
        if: always()
        run: mount | grep -iE 'fuse|nfs' || echo "no fuse/nfs mounts left (good)"
