name: CI

on:
  push:
    branches: [main]
    tags: ['v*']   # release tags run the full matrix, incl. the FreeBSD VM e2e
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Cheap gate: decide whether anything other than docs/markdown changed. The
  # heavy jobs below skip on a docs-only change (issue #75), but the workflow
  # itself still runs so the always-on `ci-ok` aggregator can report the single
  # required status check (a workflow-level `paths-ignore` would never report it
  # and would deadlock branch protection on docs-only PRs).
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
      fuse: ${{ steps.filter.outputs.fuse }}
      lidarr: ${{ steps.filter.outputs.lidarr }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
          # Full history so the three-dot merge base is present (same reason as
          # mutants.yml); a shallow clone often lacks it and the diff then fails.
          fetch-depth: 0
      - id: filter
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          case "$EVENT" in
            pull_request) base="$BASE_SHA" ;;
            *)            base="$BEFORE_SHA" ;;
          esac
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "No usable base ref; treating as a source change."
            echo "src=true" >> "$GITHUB_OUTPUT"
            echo "fuse=true" >> "$GITHUB_OUTPUT"
            echo "lidarr=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only "$base...HEAD")"
          echo "Changed files:"; echo "$changed"
          # src unless EVERY changed path is docs/** or **/*.md (mirror of the
          # paths-ignore globs). grep -v prints the non-doc paths; -q exits 0 if
          # any exists.
          if [ -z "$changed" ]; then
            echo "src=false" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$changed" | grep -qvE '^(docs/|.*\.md$)'; then
            echo "src=true" >> "$GITHUB_OUTPUT"
          else
            echo "src=false" >> "$GITHUB_OUTPUT"
          fi
          # The FreeBSD VM e2e is far too slow for every PR: run it only when the
          # FUSE/mount surface or its harness changes. Release tags run it
          # unconditionally (gated in the job's `if`, not here).
          if printf '%s\n' "$changed" | grep -qE '^(musefs-fuse/|scripts/freebsd-vm/|\.github/workflows/ci\.yml$)'; then
            echo "fuse=true" >> "$GITHUB_OUTPUT"
          else
            echo "fuse=false" >> "$GITHUB_OUTPUT"
          fi
          if printf '%s\n' "$changed" | grep -qE '^(contrib/lidarr/|scripts/(lidarr|mock_lidarr|store_assert|configure_connection)|musefs-[a-z]+/src/|Cargo\.(toml|lock))'; then
            echo "lidarr=true" >> "$GITHUB_OUTPUT"
          else
            echo "lidarr=false" >> "$GITHUB_OUTPUT"
          fi

  check:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Install libfuse3
        run: sudo apt-get update && sudo apt-get install -y fuse3 libfuse3-dev pkg-config
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Property tests (fuzzing feature)
        run: cargo test -p musefs-format --features fuzzing
      - name: DB mutants-feature clippy
        run: cargo clippy -p musefs-db --features mutants --all-targets -- -D warnings
      - name: DB mutants-feature tests
        run: cargo test -p musefs-db --features mutants
      - name: Core metrics-feature tests
        run: cargo test -p musefs-core --features metrics

  interop:
    # Property 5: an independent ecosystem reader (mutagen) reads the tags we
    # synthesize. Emits synthesized files via reader::read_at (no FUSE mount),
    # then reads them back with mutagen. Builds only musefs-core, so no libfuse.
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.x'
      - name: Install mutagen + pytest
        run: pip install -r tests/interop/requirements.txt pytest
      - name: Emit synthesized fixtures
        run: MUSEFS_INTEROP_DIR="$RUNNER_TEMP/interop" cargo test -p musefs-core --test interop_emit -- --ignored emit_interop_fixtures
      - name: mutagen interop assertions
        run: MUSEFS_INTEROP_DIR="$RUNNER_TEMP/interop" python -m pytest tests/interop -v

  contract:
    # Mandatory Python -> Rust external-writer contract (#204): builds the
    # binary, runs the binary-only plugin musefs_bin tiers with skip-on-missing
    # turned into a hard failure (MUSEFS_REQUIRE_BIN), then the synthesis round
    # trip (scan owns geometry; python-musefs writes tags/art; Rust synthesizes;
    # mutagen reads back). All three plugins' musefs_bin tiers run here,
    # including Picard's (it imports the bundled `musefs._common`, not the
    # system-Picard env). The separate `picard` job runs the full Picard suite.
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    env:
      MUSEFS_REQUIRE_BIN: "1"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Install FUSE + ffmpeg
        run: sudo apt-get update && sudo apt-get install -y fuse3 libfuse3-dev pkg-config ffmpeg
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.x'
      - name: Build musefs binary
        run: cargo build
      - name: Install Python deps (plugins + mutagen + pytest)
        run: |
          pip install -r tests/contract/requirements.txt pytest
          pip install -e contrib/python-musefs
          pip install -e "contrib/beets[test]"
          pip install -e "contrib/lidarr[test]"
      - name: Install picard plugin (no Qt test extra)
        # Plain install, NOT `[test]`: that extra pulls in pytest-qt, an
        # auto-loaded plugin that imports a Qt binding at startup and would
        # abort collection on this Qt-free runner. The path-gate musefs_bin
        # test needs only the bundled `musefs._common`; the Qt sibling modules
        # `importorskip` themselves, so they skip cleanly.
        run: pip install -e contrib/picard
      - name: beets musefs_bin tier (non-skipping)
        run: python -m pytest contrib/beets/tests -m musefs_bin -v
      - name: lidarr musefs_bin tier (non-skipping)
        run: python -m pytest contrib/lidarr/tests -m musefs_bin -v
      - name: picard musefs_bin tier (non-skipping)
        # picard's path-gate tests import `musefs._common` (the bundled plugin
        # module), NOT the system `picard`/Qt package, so they run here with no
        # system-Picard env — verified: contrib/picard/tests/test_path_gate.py:12.
        run: python -m pytest contrib/picard/tests -m musefs_bin -v
      - name: Python -> Rust synthesis round trip
        run: bash scripts/contract-roundtrip.sh

  python-musefs:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.x'
      - name: Install Ruff
        run: pip install ruff
      - name: Lint
        run: |
          ruff check contrib/python-musefs/ scripts/
          ruff format --check contrib/python-musefs/ scripts/
      - name: Install library
        run: pip install -e "contrib/python-musefs[test]"
      - name: Test
        run: python -m pytest contrib/python-musefs/tests -v
      - name: Test bump script
        run: python -m pytest scripts/test_bump_python_version.py -v
      - name: Test mutant-anchor guard
        run: python -m pytest scripts/test_check_mutant_anchors.py -v
      - name: Test release gate
        run: python -m pytest scripts/test_release_gate.py -v
      - name: Test crates-index probe
        run: python -m pytest scripts/test_crates_index.py -v
      - name: Test lidarr-smoke helpers
        run: python -m pytest scripts/test_lidarr_smoke_lib.py scripts/test_mock_lidarr.py scripts/test_store_assert.py -v

  beets:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.x'
      - name: Install Ruff
        run: pip install ruff
      - name: Lint
        run: ruff check contrib/beets/ tests/interop/
      - name: Format check
        run: ruff format --check contrib/beets/ tests/interop/
      - name: Install python-musefs (local, unpublished dependency)
        run: pip install -e contrib/python-musefs
      - name: Install beets
        run: pip install -e "contrib/beets[test]"
      - name: Test
        run: python -m pytest contrib/beets/tests -v

  lidarr:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.x'
      - name: Install Ruff
        run: pip install ruff
      - name: Lint
        run: |
          ruff check contrib/lidarr/
          ruff format --check contrib/lidarr/
      - name: Install python-musefs (local, unpublished dependency)
        run: pip install -e contrib/python-musefs
      - name: Install Lidarr integration
        run: pip install -e "contrib/lidarr[test]"
      - name: Test
        run: python -m pytest contrib/lidarr/tests -v

  picard:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Install Picard (system Python + PyQt5)
        run: sudo apt-get update && sudo apt-get install -y picard
      - name: Verify Picard module path
        run: test -d /usr/lib/picard/picard || { echo "::error::picard package not at /usr/lib/picard; PYTHONPATH is stale"; exit 1; }
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39
      - name: Create venv on the system Python
        run: uv venv --system-site-packages --python "$(which python3)"
      - name: Install plugin test deps + ruff
        run: uv pip install -e 'contrib/picard[test]' ruff
      - name: Lint
        run: |
          .venv/bin/ruff check contrib/picard/
          .venv/bin/ruff format --check contrib/picard/
      - name: Test (real Picard, headless)
        env:
          PYTHONPATH: /usr/lib/picard
          QT_QPA_PLATFORM: offscreen
        run: .venv/bin/python -m pytest contrib/picard/tests -v

  e2e:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Install FUSE and ffmpeg
        run: sudo apt-get update && sudo apt-get install -y fuse3 libfuse3-dev pkg-config ffmpeg
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: FUSE end-to-end tests
        run: cargo test -p musefs-fuse -- --ignored
      - name: FUSE fault-injection + concurrency (metrics feature)
        run: cargo test -p musefs-fuse --features metrics -- --ignored

  macos:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  asan:
    # AddressSanitizer over the core-level concurrent test. Nightly + explicit
    # target are required for -Zsanitizer. We do NOT use -Zbuild-std (kept fast
    # and reliable); ASan still interposes malloc globally, so it catches heap
    # errors reached in the C deps (libsqlite3) from this test. detect_leaks=0:
    # this gate is about memory-safety (UAF/OOB), not leaks (sqlite/global
    # statics produce benign LSan noise).
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: nightly
          targets: x86_64-unknown-linux-gnu
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: AddressSanitizer (core concurrent reads)
        env:
          RUSTFLAGS: "-Zsanitizer=address"
          ASAN_OPTIONS: "detect_leaks=0"
        run: >-
          cargo +nightly test -p musefs-core --test concurrent_reads
          --target x86_64-unknown-linux-gnu

  tsan:
    # ThreadSanitizer is BEST-EFFORT and deliberately NOT in ci-ok: it cannot
    # instrument the system C libs (libfuse, libsqlite3), so it sees races in
    # our code around the FFI but may miss or false-positive inside the C deps.
    # continue-on-error keeps a noisy run from showing as a hard failure.
    #
    # Unlike AddressSanitizer (which is ABI-compatible with an uninstrumented
    # std), ThreadSanitizer changes the ABI, so nightly rejects linking tsan
    # crates against a non-tsan std. We therefore rebuild std with the sanitizer
    # via `-Zbuild-std` (needs the `rust-src` component).
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Install libfuse3
        run: sudo apt-get update && sudo apt-get install -y fuse3 libfuse3-dev pkg-config
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: nightly
          targets: x86_64-unknown-linux-gnu
          components: rust-src
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: ThreadSanitizer (core concurrent reads)
        env:
          RUSTFLAGS: "-Zsanitizer=thread"
          TSAN_OPTIONS: "halt_on_error=0"
        run: >-
          cargo +nightly test -p musefs-core -Zbuild-std --test concurrent_reads
          --target x86_64-unknown-linux-gnu
      - name: ThreadSanitizer (mount concurrent reads, best-effort)
        env:
          RUSTFLAGS: "-Zsanitizer=thread"
          TSAN_OPTIONS: "halt_on_error=0"
        run: >-
          cargo +nightly test -p musefs-fuse -Zbuild-std --test concurrent_reads
          --target x86_64-unknown-linux-gnu -- --ignored

  freebsd:
    # Expensive (a full in-VM build), so NOT on every PR: only when the
    # FUSE/mount surface or its harness changed, or on a release tag (`v*`).
    needs: changes
    if: >-
      startsWith(github.ref, 'refs/tags/') ||
      needs.changes.outputs.fuse == 'true'
    runs-on: ubuntu-latest
    # Bound a stuck VM/provision step rather than holding a runner for the
    # workflow default. A clean run is ~6 min (image download + in-VM build).
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: vmactions/freebsd-vm@a6de9343ef5747433d9c25784c90e84998b9d69a
        with:
          usesh: true
          prepare: sh scripts/freebsd-vm/provision.sh
          run: sh scripts/freebsd-vm/run-e2e.sh

  lidarr-smoke:
    needs: changes
    if: needs.changes.outputs.lidarr == 'true'
    uses: ./.github/workflows/lidarr-smoke.yml

  # Single required status check for branch protection. Always runs (even when
  # the heavy jobs were skipped on a docs-only change) so the check is always
  # reported; green when every needed job either succeeded or was skipped, red
  # if any failed or was cancelled.
  ci-ok:
    if: always()
    needs: [changes, check, interop, contract, python-musefs, beets, lidarr, picard, e2e, macos, freebsd, asan, lidarr-smoke]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate required-job results
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          set -euo pipefail
          echo "Needed job results: $RESULTS"
          for r in $RESULTS; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::A required CI job did not pass (result: $r)."
              exit 1
            fi
          done
          echo "All required CI jobs passed or were skipped."
