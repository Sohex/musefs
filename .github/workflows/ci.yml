name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install libfuse3
        run: sudo apt-get update && sudo apt-get install -y fuse3 libfuse3-dev pkg-config
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace
      - name: Property tests (fuzzing feature)
        run: cargo test -p musefs-format --features fuzzing
      - name: DB mutants-feature clippy
        run: cargo clippy -p musefs-db --features mutants --all-targets -- -D warnings
      - name: DB mutants-feature tests
        run: cargo test -p musefs-db --features mutants

  interop:
    # Property 5: an independent ecosystem reader (mutagen) reads the tags we
    # synthesize. Emits synthesized files via reader::read_at (no FUSE mount),
    # then reads them back with mutagen. Builds only musefs-core, so no libfuse.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.x'
      - name: Install mutagen + pytest
        run: pip install -r tests/interop/requirements.txt pytest
      - name: Emit synthesized fixtures
        run: MUSEFS_INTEROP_DIR="$RUNNER_TEMP/interop" cargo test -p musefs-core --test interop_emit -- --ignored emit_interop_fixtures
      - name: mutagen interop assertions
        run: MUSEFS_INTEROP_DIR="$RUNNER_TEMP/interop" python -m pytest tests/interop -v

  beets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.x'
      - name: Install Ruff
        run: pip install ruff
      - name: Lint
        run: ruff check contrib/beets/ tests/interop/
      - name: Format check
        run: ruff format --check contrib/beets/ tests/interop/
      - name: Install beets
        run: pip install -e "contrib/beets[test]"
      - name: Test
        run: python -m pytest contrib/beets/tests -v

  picard:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install Picard (system Python + PyQt5)
        run: sudo apt-get update && sudo apt-get install -y picard
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
      - name: Create venv on the system Python
        run: uv venv --system-site-packages --python "$(which python3)"
      - name: Install plugin test deps + ruff
        run: uv pip install -e 'contrib/picard[test]' ruff
      - name: Lint
        run: |
          .venv/bin/ruff check contrib/picard/
          .venv/bin/ruff format --check contrib/picard/
      - name: Test (real Picard, headless)
        env:
          PYTHONPATH: /usr/lib/picard
          QT_QPA_PLATFORM: offscreen
        run: .venv/bin/python -m pytest contrib/picard/tests -v

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - name: Install FUSE and ffmpeg
        run: sudo apt-get update && sudo apt-get install -y fuse3 libfuse3-dev pkg-config ffmpeg
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: FUSE end-to-end tests
        run: cargo test -p musefs-fuse -- --ignored
