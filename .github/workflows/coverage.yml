name: coverage
on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: coverage-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  # Cheap gate: skip the coverage run on a docs-only change (issue #75) while
  # still reporting the always-on `coverage-ok` required check. See ci.yml's
  # `changes` job for the rationale.
  changes:
    runs-on: ubuntu-latest
    outputs:
      src: ${{ steps.filter.outputs.src }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
          fetch-depth: 0
      - id: filter
        env:
          EVENT: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          set -euo pipefail
          case "$EVENT" in
            pull_request) base="$BASE_SHA" ;;
            *)            base="$BEFORE_SHA" ;;
          esac
          if [ -z "$base" ] || [ "$base" = "0000000000000000000000000000000000000000" ]; then
            echo "No usable base ref; treating as a source change."
            echo "src=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed="$(git diff --name-only "$base...HEAD")"
          echo "Changed files:"; echo "$changed"
          if [ -z "$changed" ]; then
            echo "src=false" >> "$GITHUB_OUTPUT"
          elif printf '%s\n' "$changed" | grep -qvE '^(docs/|.*\.md$)'; then
            echo "src=true" >> "$GITHUB_OUTPUT"
          else
            echo "src=false" >> "$GITHUB_OUTPUT"
          fi

  coverage:
    needs: changes
    if: needs.changes.outputs.src == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Install libfuse3
        run: sudo apt-get update && sudo apt-get install -y fuse3 libfuse3-dev pkg-config
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: llvm-tools-preview
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@25435dc8dd3baed7417e0c96d3fe89013a5b2e09
        with:
          tool: cargo-llvm-cov
      - name: Collect coverage
        # musefs-fuse and musefs-latencyfs are the FUSE crates: their behavior is
        # exercised only by #[ignore]d /dev/fuse e2e tests, which this job does not
        # run, so instrumenting them would report misleading near-zero coverage.
        # They follow the FUSE coverage strategy (scored by e2e evidence, not
        # llvm-cov); see docs/audits/2026-05-29-test-audit.md.
        run: cargo llvm-cov --workspace --exclude musefs-fuse --exclude musefs-latencyfs --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354
        with:
          files: lcov.info
          fail_ci_if_error: true
          token: ${{ secrets.CODECOV_TOKEN }}

  # Single required status check for branch protection; see ci.yml's `ci-ok`.
  coverage-ok:
    if: always()
    needs: [changes, coverage]
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate required-job results
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          set -euo pipefail
          echo "Needed job results: $RESULTS"
          for r in $RESULTS; do
            if [ "$r" = "failure" ] || [ "$r" = "cancelled" ]; then
              echo "::error::The coverage job did not pass (result: $r)."
              exit 1
            fi
          done
          echo "Coverage passed or was skipped."
