name: Release

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.x'
      - name: Verify tag matches workspace version
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          WS_VERSION="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"
          echo "tag=$TAG_VERSION workspace=$WS_VERSION"
          if [ "$TAG_VERSION" != "$WS_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match workspace version $WS_VERSION"
            exit 1
          fi
      - name: Wait for required CI checks to be green on the tagged commit
        env:
          GH_TOKEN: ${{ github.token }}
          SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          # Poll the Checks API until ci-ok and coverage-ok complete on this
          # commit. release_gate.py decides: exit 0 = all green, 2 = keep
          # waiting, 1 = a required check failed. The tag also triggers ci.yml
          # and coverage.yml, so these checks are (re)generated for this tree.
          deadline=$(( $(date +%s) + 45 * 60 ))   # 45 min covers the full matrix
          while :; do
            # --slurp collects all pages into one JSON array; the jq filter then
            # flattens every page's check_runs into a single {check_runs: [...]}
            # object (plain --paginate would emit one object per page, which is
            # not valid single-document JSON).
            # `|| true`: tolerate a transient gh/API failure — release_gate.py
            # treats an empty/garbled checks.json as "wait", so the loop retries
            # rather than aborting the release on a single blip.
            gh api "repos/${GITHUB_REPOSITORY}/commits/${SHA}/check-runs" \
              --paginate --slurp -q '{check_runs: [.[].check_runs[]]}' > checks.json || true
            set +e
            python scripts/release_gate.py --names ci-ok coverage-ok < checks.json
            rc=$?
            set -e
            if [ "$rc" -eq 0 ]; then break; fi
            if [ "$rc" -eq 1 ]; then exit 1; fi
            if [ "$(date +%s)" -ge "$deadline" ]; then
              echo "::error::Timed out waiting for ci-ok/coverage-ok on ${SHA}"
              exit 1
            fi
            sleep 20
          done

  publish:
    needs: smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Install libfuse3
        run: sudo apt-get update && sudo apt-get install -y fuse3 libfuse3-dev pkg-config
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: '3.x'
      - name: Publish crates in dependency order
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          # Keep this list in sync with the workspace members in Cargo.toml,
          # in dependency order (a crate must come after everything it depends on).
          for c in musefs-db musefs-format musefs-core musefs-fuse musefs-cli musefs; do
            if python scripts/crates_index.py "$c" "$VERSION"; then
              echo "=== $c@$VERSION already published; skipping ==="
            else
              echo "=== publishing $c ==="
              cargo publish -p "$c" --locked
            fi
            # Wait for the just-published (or pre-existing) version to be
            # resolvable before the next dependent crate publishes (#163).
            echo "=== waiting for $c@$VERSION to appear in the index ==="
            deadline=$(( $(date +%s) + 10 * 60 ))
            until python scripts/crates_index.py "$c" "$VERSION"; do
              if [ "$(date +%s)" -ge "$deadline" ]; then
                echo "::error::$c@$VERSION did not appear in the crates.io index within 10m"
                exit 1
              fi
              sleep 10
            done
          done

  build:
    needs: gate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: x86_64-unknown-linux-gnu
            zig_target: x86_64-unknown-linux-gnu.2.17
          - triple: aarch64-unknown-linux-gnu
            zig_target: aarch64-unknown-linux-gnu.2.17
          - triple: x86_64-unknown-linux-musl
            zig_target: x86_64-unknown-linux-musl
          - triple: aarch64-unknown-linux-musl
            zig_target: aarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
        with:
          key: ${{ matrix.triple }}
      - name: Install Zig and cargo-zigbuild
        env:
          ZIG_VERSION: "0.13.0"
          CARGO_ZIGBUILD_VERSION: "0.22.3"
        run: |
          set -euo pipefail
          curl -fsSL "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz" | tar -xJ
          echo "$PWD/zig-linux-x86_64-${ZIG_VERSION}" >> "$GITHUB_PATH"
          curl -fsSL "https://github.com/rust-cross/cargo-zigbuild/releases/download/v${CARGO_ZIGBUILD_VERSION}/cargo-zigbuild-v${CARGO_ZIGBUILD_VERSION}.x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz -C "$HOME/.cargo/bin" cargo-zigbuild
      - name: Add Rust target
        run: rustup target add ${{ matrix.triple }}
      - name: Build
        run: cargo zigbuild --release -p musefs --target ${{ matrix.zig_target }}
      - name: Package
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          NAME="musefs-${VERSION}-${{ matrix.triple }}"
          mkdir -p dist
          tar -C "target/${{ matrix.triple }}/release" -czf "dist/${NAME}.tar.gz" musefs
          ( cd dist && sha256sum "${NAME}.tar.gz" > "${NAME}.tar.gz.sha256" )
          ls -l dist
      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: musefs-${{ matrix.triple }}
          path: dist/*
          if-no-files-found: error
          retention-days: 7

  smoke:
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - triple: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            mode: host
          - triple: aarch64-unknown-linux-gnu
            runner: ubuntu-24.04-arm
            mode: host
          - triple: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            mode: alpine
          - triple: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
            mode: alpine
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - name: Download artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: musefs-${{ matrix.triple }}
          path: dist
      - name: Extract binary
        run: |
          set -euo pipefail
          tar -xzf dist/musefs-*-${{ matrix.triple }}.tar.gz -C .
          ./musefs --version || true   # glibc/musl host may differ; real check is the smoke
      - name: Smoke (host)
        if: matrix.mode == 'host'
        run: |
          set -euo pipefail
          sudo apt-get update && sudo apt-get install -y fuse3 ffmpeg
          ./scripts/smoke-binary.sh ./musefs
      - name: Smoke (Alpine container)
        if: matrix.mode == 'alpine'
        run: |
          set -euo pipefail
          docker run --rm \
            --device /dev/fuse --cap-add SYS_ADMIN --security-opt apparmor=unconfined \
            -v "$PWD":/w -w /w \
            alpine:3.20 \
            sh -c 'apk add --no-cache fuse3 ffmpeg >/dev/null && sh scripts/smoke-binary.sh ./musefs'

  release-assets:
    needs: [smoke, publish]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: dist
          merge-multiple: true
      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          ls -l dist
          # Create the release for this tag if it doesn't exist yet, then upload
          # (idempotent on re-run via --clobber).
          if ! gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release create "$GITHUB_REF_NAME" --verify-tag \
              --title "$GITHUB_REF_NAME" \
              --notes "Prebuilt binaries for ${GITHUB_REF_NAME}. Verify with: sha256sum -c <file>.sha256"
          fi
          gh release upload "$GITHUB_REF_NAME" dist/*.tar.gz dist/*.sha256 --clobber
