name: lidarr-e2e

# Full real-instance Lidarr end-to-end gate (issue #224). Boots a real Lidarr
# against local mocks (metadata/indexer/qBittorrent), drives a genuine
# download-client import of a real CC0 album as a NewDownload so OnReleaseImport
# fires the real musefs scripts, and proves the served file carries Lidarr's
# metadata with the backing bytes unchanged. Heavier than the mock-only smoke;
# used as the release gate (and dispatchable), not on every PR.

on:
  workflow_call:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lidarr-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: '3.x'
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y fuse3 ffmpeg
      - name: Build musefs (debug)
        run: cargo build -p musefs
      - name: Run the full Lidarr real-instance e2e
        env:
          # Pinned multi-arch index digest for linuxserver/lidarr 3.1.0.4875-ls30
          # (the version the 2026-06-07 manual smoke validated). Bump deliberately
          # and re-run the dispatch acceptance when changing it.
          LIDARR_IMAGE: lscr.io/linuxserver/lidarr@sha256:b08b2194fa4ddb7f7ace9d1bfd82bd9b26f457d79aa70f42d923d2e15a820f0e
        run: ./scripts/lidarr-e2e/run-e2e.sh ./target/debug/musefs
