name: Mutants

on:
  pull_request:
    paths:
      - 'musefs-db/**'
      - 'musefs-core/**'
      - 'musefs-format/**'
      - 'scripts/mutants.sh'
      # The anchor guard validates these against the live mutant set, so a PR that
      # only touches the exclusion config or the guard itself must still run it.
      - '.cargo/mutants.toml'
      - 'scripts/check_mutant_anchors.py'
      - '.github/workflows/mutants.yml'
  schedule:
    - cron: '0 4 * * 1'  # Mondays 04:00 UTC
  workflow_dispatch:
  # Deliberately NO `push: branches: [main]`. fuzz.yml has one to warm its corpus
  # cache; a mutation campaign has no corpus to warm and takes hours, so running
  # it on every merge to main is pure cost. Schedule + manual dispatch suffice.

concurrency:
  group: mutants-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    # Cheap gate: decide whether the mutation harness itself changed. The `canary`
    # job exercises scripts/mutants.sh end to end, so it only earns its cost when
    # that wrapper (or this workflow) can have regressed — not on every crate PR,
    # where it's redundant with `in-diff` and just pays a second multi-minute
    # `cargo install cargo-mutants`. The workflow-level `paths` filter can't
    # express this (it governs all jobs and `in-diff` must run on crate changes),
    # so we compute it here and gate `canary` below. Mirrors ci.yml's `changes`.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      harness: ${{ steps.filter.outputs.harness }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
          # Full history so the three-dot merge base is present (same reason as
          # the in-diff job); a shallow clone often lacks it and the diff fails.
          fetch-depth: 0
      - id: filter
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          changed="$(git diff --name-only "$BASE_SHA...HEAD")"
          echo "Changed files:"; echo "$changed"
          # harness=true iff scripts/mutants.sh or this workflow changed.
          if printf '%s\n' "$changed" | grep -qxE 'scripts/mutants\.sh|\.github/workflows/mutants\.yml'; then
            echo "harness=true" >> "$GITHUB_OUTPUT"
          else
            echo "harness=false" >> "$GITHUB_OUTPUT"
          fi

  in-diff-plan:
    # Per-PR: validate the exclusion anchors, then size the in-diff campaign.
    # A large refactor can change hundreds of lines, and the serial in-diff gate
    # is ~one `cargo test` per mutant — so when the diff carries more than 50
    # mutants we fan them out: this job lists them, sets n = ceil(count / 50),
    # and emits a matrix of `i/n` shards the `in-diff` job runs in parallel
    # (n == 1 for <=50, i.e. a single runner identical to the unsharded gate).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      has_mutants: ${{ steps.plan.outputs.has_mutants }}
      matrix: ${{ steps.plan.outputs.matrix }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
          # Full history so the merge base for the three-dot diff is present;
          # a shallow clone often lacks it and `git diff base...HEAD` then fails.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Install cargo-mutants
        # Unpinned (like fuzz.yml installs cargo-fuzz) for toolchain-compat;
        # known-good version is 27.0.0 (documented in scripts/mutants.sh).
        run: cargo install cargo-mutants
      - name: Check mutant-exclusion anchors
        run: |
          cargo mutants --no-config --list --json > mutants-list.json
          python3 scripts/check_mutant_anchors.py --mutants-json mutants-list.json
      - name: Plan in-diff shards
        id: plan
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          git diff "$BASE_SHA...HEAD" -- '*.rs' > mutants.diff
          echo "Changed Rust lines:"; wc -l mutants.diff
          if [ ! -s mutants.diff ]; then
            echo "No in-scope Rust changes; nothing to mutate."
            echo "has_mutants=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Count the mutants this PR will run, honouring the SAME config +
          # exclude the shard jobs apply, so `--shard i/n` partitions exactly
          # this set (--list is parse-only; no build, no tests).
          count="$(cargo mutants --in-diff mutants.diff --exclude 'musefs-latencyfs/**' --list | wc -l)"
          echo "in-diff mutants: $count"
          if [ "$count" -eq 0 ]; then
            echo "has_mutants=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          matrix="$(python3 -c 'import json,math,sys; n=max(1,math.ceil(int(sys.argv[1])/50)); print(json.dumps([{"shard":f"{i}/{n}","name":str(i)} for i in range(n)],separators=(",",":")))' "$count")"
          echo "shards: $matrix"
          echo "has_mutants=true" >> "$GITHUB_OUTPUT"
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  in-diff:
    # Per-PR: mutate only the lines changed in this PR, fanned across the shards
    # `in-diff-plan` sized. Each shard is a disjoint slice of the in-diff mutants
    # (cargo-mutants randomizes order *within* a shard only, so coverage is whole
    # and deterministic). Skipped entirely when the diff yields no mutants.
    needs: in-diff-plan
    if: github.event_name == 'pull_request' && needs.in-diff-plan.outputs.has_mutants == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.in-diff-plan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
          # Full history so the merge base for the three-dot diff is present;
          # a shallow clone often lacks it and `git diff base...HEAD` then fails.
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Install cargo-mutants
        # Unpinned (like fuzz.yml installs cargo-fuzz) for toolchain-compat;
        # known-good version is 27.0.0 (documented in scripts/mutants.sh).
        run: cargo install cargo-mutants
      - name: Build the merge-base diff
        # Rebuilt here (not shared from in-diff-plan) so each shard is a
        # self-contained job; `BASE_SHA...HEAD` is identical across jobs, so the
        # mutant set — and therefore each `--shard i/n` slice — matches the plan.
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          git diff "$BASE_SHA...HEAD" -- '*.rs' > mutants.diff
          echo "Changed Rust lines:"; wc -l mutants.diff
      - name: Mutate changed lines (shard ${{ matrix.shard }})
        run: |
          # This fast gate runs the default `cargo test` (no libfuse, no
          # `--ignored`), so it can't exercise musefs-latencyfs — every mutant
          # there would falsely survive. That crate is mutation-tested in the
          # scheduled `full` job below, which installs libfuse and runs its
          # mounted #[ignore]d tests. Exclude it here so the gate stays honest.
          # `--output` collects the per-mutant report (missed.txt / caught.txt /
          # outcomes.json) so it can be uploaded even when the gate fails, giving
          # the authoritative survivor list without re-running the campaign.
          # cargo-mutants' --output does a plain mkdir of the leaf (not mkdir -p),
          # so the parent must already exist (same gotcha as scripts/mutants.sh).
          mkdir -p mutants-out
          cargo mutants --in-diff mutants.diff -j1 --exclude 'musefs-latencyfs/**' \
            --shard "${{ matrix.shard }}" --output mutants-out/in-diff
      - name: Upload survivor report
        # `always()` so the report uploads even when the gate fails on a survivor
        # (the failing run is exactly when the survivor list is wanted).
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          # Per-shard artifact names (a slash in matrix.shard is illegal here).
          name: mutants-in-diff-${{ matrix.name }}
          path: mutants-out/in-diff
          if-no-files-found: warn

  canary:
    # Per-PR: exercise the REAL scripts/mutants.sh pipeline (out-of-repo scratch,
    # source-tree copy, --output dir, report) cheaply via --check on the smallest
    # crate. Catches the copy-recursion / output-dir class of bugs the --list
    # smoke test can't (list mode neither copies the tree nor creates output).
    # cargo-check only, no test runs, so it stays fast. Gated on the `changes`
    # job: only runs when scripts/mutants.sh or this workflow changed, since the
    # harness logic can't regress on an ordinary crate edit.
    needs: changes
    if: github.event_name == 'pull_request' && needs.changes.outputs.harness == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Install cargo-mutants
        run: cargo install cargo-mutants
      - name: Canary (check-only) run of the harness
        run: MUTANTS_CANARY=1 scripts/mutants.sh musefs-db

  full:
    # Scheduled or manually dispatched: full per-crate campaign.
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # db and core are quick (~5m / ~16m). musefs-format alone ran ~2h as a
        # single serial leg (75% of the whole campaign's wall-clock), so it is
        # split into 4 shards (~30m each) via cargo-mutants --shard. Each shard
        # is a disjoint subset of the format mutants; their survivor reports are
        # concatenated when (re)building the inventory.
        include:
          - { crate: musefs-db, label: musefs-db }
          - { crate: musefs-core, label: musefs-core }
          - { crate: musefs-format, label: musefs-format-0, shard: 0/4 }
          - { crate: musefs-format, label: musefs-format-1, shard: 1/4 }
          - { crate: musefs-format, label: musefs-format-2, shard: 2/4 }
          - { crate: musefs-format, label: musefs-format-3, shard: 3/4 }
          - { crate: musefs-fuse, label: musefs-fuse }
          # musefs-latencyfs carries real logic (inode map, latency table, attr
          # mapping, passthrough ops); scripts/mutants.sh runs its mounted
          # #[ignore]d tests, so this leg needs libfuse + /dev/fuse.
          - { crate: musefs-latencyfs, label: musefs-latencyfs }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32
      - name: Install FUSE
        # Only the musefs-latencyfs leg mounts a passthrough FS in its tests.
        if: matrix.crate == 'musefs-latencyfs'
        run: sudo apt-get update && sudo apt-get install -y fuse3 libfuse3-dev pkg-config
      - name: Install cargo-mutants
        # Unpinned (like fuzz.yml installs cargo-fuzz) for toolchain-compat;
        # known-good version is 27.0.0 (documented in scripts/mutants.sh).
        run: cargo install cargo-mutants
      - name: Run mutation campaign
        # Empty for the db/core legs (no `shard` key) → MUTANTS_SHARD unset →
        # whole crate. Set to "k/4" for the format shards.
        env:
          MUTANTS_SHARD: ${{ matrix.shard }}
        run: scripts/mutants.sh "${{ matrix.crate }}"
      - name: Upload survivor report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          # Per-shard artifact names (a slash in matrix.shard is illegal here).
          name: mutants-${{ matrix.label }}
          path: mutants-out/${{ matrix.crate }}
          if-no-files-found: warn
