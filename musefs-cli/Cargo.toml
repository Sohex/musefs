[package]
name = "musefs-cli"
version = "0.1.0"
edition = "2021"
license = "MIT"

[[bin]]
name = "musefs"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
anyhow = "1"
musefs-db = { path = "../musefs-db" }
musefs-core = { path = "../musefs-core" }
musefs-fuse = { path = "../musefs-fuse" }

[dev-dependencies]
tempfile = "3"

[lints]
workspace = true
