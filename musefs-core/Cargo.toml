[package]
name = "musefs-core"
version = "0.1.0"
edition = "2021"
license = "MIT"

[features]
metrics = []

[dependencies]
arc-swap = "1"
musefs-db = { path = "../musefs-db" }
musefs-format = { path = "../musefs-format" }
once_cell = "1"
thiserror = "1"

[dev-dependencies]
tempfile = "3"
metaflac = "0.2"
id3 = "1"
criterion = "0.5"

[[bench]]
name = "read_throughput"
harness = false

[lints]
workspace = true
