# cargo-mutants workspace config.
#
# Crates permanently out of scope for mutation testing: thin glue with no real
# logic. musefs-fuse is a thin fuser adapter, musefs-cli is thin CLI dispatch,
# and the `musefs` binary is a one-line entrypoint — their behavior is covered by
# e2e/integration tests, and mutating them yields only equivalent or trivially
# untestable mutants. See docs/audits/2026-05-29-test-audit.md.
#
# musefs-latencyfs is NOT excluded here: it carries real logic (the inode map,
# latency table, attr mapping, passthrough op behavior), so it gets its own
# mutation leg in scripts/mutants.sh / mutants.yml that installs libfuse and runs
# the #[ignore]d mounted tests (`-- -- --include-ignored`). The fast per-PR
# `--in-diff` gate excludes it separately (it is mountless and can't kill its
# mutants); see .github/workflows/mutants.yml.
#
# musefs-core/src/metrics.rs is feature-gated instrumentation: its active impl is
# `#[cfg(feature = "metrics")]` and is only compiled (with its tests) under
# `--features metrics`. The per-PR `--in-diff` gate runs cargo-mutants without that
# feature, so the counter bodies aren't compiled and any mutation there is
# unobservable — reported MISSED yet unkillable in that config. The counters are a
# pure observability shim with no serving/correctness role and are covered
# functionally by the feature-gated tests in that file, so exclude them from
# mutation rather than carry permanently-surviving mutants.
exclude_globs = [
    "musefs-fuse/**",
    "musefs-cli/**",
    "musefs/**",
    "musefs-core/src/metrics.rs",
]

# Equivalent / unreachable mutants in the SP1 scan pipeline that no correctness
# test can kill (they alter performance or batching granularity, not observable
# results, or live in unreachable defensive branches). Documented per class.
# Anchored on file:line:col so only the proven-equivalent sites are suppressed;
# killable siblings (e.g. flac `|`->`&`, scan 711 `+`->`*`) stay in scope.
exclude_re = [
    # probe_file widen loop: `.max(want + 1)` is dominated — the bounded probers
    # only return `NeedMore{up_to}` with `up_to > want` (we widen precisely to a
    # block end past the prefix), so `up_to.min(file_len)` always wins the max and
    # the `want + 1` term is never selected. `+`->`-`/`*` are equivalent.
    'musefs-core/src/scan\.rs:225:31:',
    # probe_file post-loop fallback guard `(prefix.len() as u64) < file_len`: when
    # it differs, the only effect is a redundant whole-file re-read that feeds the
    # same `probe_full` result. The >8-retry path that could diverge is unreachable
    # given the probers' exact (FLAC/MP3/WAV) / geometric (Ogg) NeedMore.
    'musefs-core/src/scan\.rs:232:30:',
    # run_pipeline sync_channel capacity `jobs * 2`: pure throughput/blocking knob;
    # the persisted track set is identical for any positive capacity.
    'musefs-core/src/scan\.rs:493:46:',
    # run_pipeline flush cadence (batch_bytes accounting + the
    # `len >= BATCH_FILES || batch_bytes >= cap` flush triggers, both the try_recv
    # and the recv branch): the mid-loop threshold flush is belt-and-suspenders on
    # top of the flush-on-empty safety net + the final post-loop flush, so any
    # cadence mutation persists the identical track set. The win is fewer commits
    # (fsyncs), a performance property only observable via the `metrics`
    # instrumentation the in-diff gate does not build.
    'musefs-core/src/scan\.rs:573:29:',
    'musefs-core/src/scan\.rs:575:32:',
    'musefs-core/src/scan\.rs:575:47:',
    'musefs-core/src/scan\.rs:575:62:',
    'musefs-core/src/scan\.rs:583:37:',
    'musefs-core/src/scan\.rs:585:40:',
    'musefs-core/src/scan\.rs:585:55:',
    'musefs-core/src/scan\.rs:585:70:',
    # revalidate_with `skip_failed += 1`: unreachable defensive accounting.
    # collect_audio yields only existing regular files, so a just-collected file's
    # metadata()/canonicalize() fails solely under a TOCTOU race — not reachable
    # from a deterministic test. With skip_failed identically 0, the `failed =
    # scan.failed + skip_failed` sum is also insensitive to `+`->`-` (the `+`->`*`
    # variant IS caught, so only `-` is excluded here).
    'musefs-core/src/scan\.rs:672:25:',
    'musefs-core/src/scan\.rs:676:25:',
    'musefs-core/src/scan\.rs:711:29: replace \+ with -',
    # flac::read_metadata_bounded 24-bit block-length assembly: the three length
    # bytes occupy disjoint bit ranges after shifting, so `|`, `^`, and `+` are
    # bit-for-bit identical there (the `|`->`&` variant collapses to 0 and IS
    # caught). Same equivalence the sibling parse_blocks/read_vorbis_comments tests
    # already note.
    'musefs-format/src/flac\.rs:\d+:\d+: replace \| with \^ in read_metadata_bounded',

    # SP2 incremental tree refresh — equivalent mutants in apply_changes & friends.
    # The whole design contract is "the incrementally-mutated tree is byte-identical
    # to a full VirtualTree::build_with over the same final track set" (enforced by
    # the property oracle + a debug_assert in poll_refresh). Several mutations only
    # change HOW MUCH work the in-place path does — never its output — so no
    # black-box test over the tree can distinguish them, and the in-diff gate builds
    # without the `metrics` feature, so there is no counter to observe the path
    # taken either. Anchored on file:line:col so killable siblings stay in scope.
    #
    # force_apply_failure_for_test -> (): the no-op leaves force_apply_fail false, so
    # poll_refresh runs the incremental path instead of the injected full-rebuild
    # fallback. Both produce an identical tree (same nodes AND same inodes — the
    # allocator interns by path and never recycles), so the only difference is an
    # eprintln on stderr. The fallback's build_with is itself directly tested; this
    # injection point exists only to drive that branch, with nothing observable to
    # assert in this config.
    'musefs-core/src/facade\.rs:510:9: replace Musefs::force_apply_failure_for_test with \(\)',
    # apply_changes path-stable guard `&self.path_of(ino) == new_path` -> false: a
    # `changed` id whose rendered path is unchanged would be treated as a move
    # (remove + re-insert at the same path) instead of a no-op. Re-interning the same
    # path yields the same inode and rebuild_subtree re-canonicalizes the parent, so
    # the resulting tree is identical — a pure short-circuit optimization.
    'musefs-core/src/tree\.rs:354:30: replace match guard .* with false in VirtualTree::apply_changes',
    # add-side dirty propagation `id < self.introducing_id(child)` -> `<=`: `<=` is a
    # strict superset of `<`, so it can only mark MORE ancestor dirs dirty. Every
    # dirty dir is rebuilt to the same canonical layout build_with would produce, so
    # over-marking changes only the work done, not the tree.
    'musefs-core/src/tree\.rs:389:45: replace < with <= in VirtualTree::apply_changes',
    #
    # Non-terminating mutants (reported as TIMEOUT, never a clean kill): each turns a
    # bounded upward walk into an infinite loop, because the root is its own parent
    # (root.parent == ROOT) and these guards are exactly what stops the walk at root.
    # cargo-mutants can only ever flag them via the 22s auto-timeout; they cannot be
    # "caught" by an assertion, so they are excluded rather than left to flake the
    # gate on the timeout budget.
    #
    # remove/move-side dirty propagation `child != ROOT && introducing_id(child) == id`
    # -> `||`: the `||` keeps looping once child reaches ROOT whenever ROOT's global
    # min id equals `id`, and child stays ROOT forever.
    'musefs-core/src/tree\.rs:376:43: replace && with \|\| in VirtualTree::apply_changes',
    # add-side dirty propagation `child != ROOT && id < introducing_id(child)` -> `||`:
    # same non-terminating root walk as above.
    'musefs-core/src/tree\.rs:389:39: replace && with \|\| in VirtualTree::apply_changes',
    # ancestor_in's loop terminator `cur == Self::ROOT` -> `!=`: the walk never breaks
    # at root (root.parent == root), so a node with no ancestor in the set loops
    # forever instead of returning false.
    'musefs-core/src/tree\.rs:455:20: replace == with != in VirtualTree::ancestor_in',

    # SP4 storage-aware serving — equivalent mutant in serve_ogg_window's last-page
    # memo. `total_len = header_len + payload_len` only sets the memoized page's
    # [start, start+total_len) range, which find_page_start uses to decide whether to
    # short-circuit. `+`->`*` only ever makes total_len LARGER (real pages) or 0
    # (payload_len 0), never landing find_page_start on a page AFTER the true one:
    # too-large only widens the range so the forward walk STARTS at an
    # earlier-or-equal page (its overlap clipping then emits the identical bytes), and
    # 0 disables the short-circuit (falls to the scan, also correct). So the served
    # output is byte-identical either way. (`+`->`-` underflows and is caught.) Pinned
    # by line:col — one of several `+` in this fn; the others ARE caught.
    'musefs-core/src/ogg_index\.rs:194:41: replace \+ with \* in serve_ogg_window',

    # SP4 crc_shift_zeros — equivalent mutants inherent to the loop/matrix hybrid.
    # crc_shift_zeros has two code paths (a per-step loop and a GF(2) matrix-power)
    # that compute the IDENTICAL value; the differential test pins the result, but no
    # test can distinguish the internal dispatch/optimization that these mutate.
    # Anchored on operator+function (line-agnostic) since each is the sole such site.
    #
    # `if n == 0 || crc == 0 { return crc }` early return, `||`->`&&`: a pure
    # short-circuit. For n==0 the loop/matrix run 0 steps and return crc unchanged;
    # for crc==0 they propagate 0. So skipping (or not) the early return is the same.
    'musefs-format/src/ogg/crc\.rs:\d+:\d+: replace \|\| with && in crc_shift_zeros',
    # path-dispatch threshold `if n < MATRIX_THRESHOLD`: the loop and the matrix
    # return the same CRC for every n, so `<`->`==`/`>`/`<=` only changes which
    # equivalent path runs, never the output. (Sole `<` in crc_shift_zeros.)
    'musefs-format/src/ogg/crc\.rs:\d+:\d+: replace < with (==|>|<=) in crc_shift_zeros',
    # poly_step `(p << 8) ^ TABLE[p >> 24]`, `^`->`|`: poly_step is only ever applied
    # to single-bit basis vectors `1 << (31-i)`. For those, `p << 8` is 0 whenever
    # `TABLE[p >> 24]` is non-zero (i < 8) and `TABLE[p >> 24]` is 0 (== TABLE[0])
    # whenever `p << 8` is non-zero (i >= 8) — the two operands are always disjoint,
    # so `^` and `|` are bit-identical, and the built matrix is unchanged. (The
    # linear-path `^` elsewhere in crc_shift_zeros IS caught and stays in scope.)
    'musefs-format/src/ogg/crc\.rs:\d+:\d+: replace \^ with \| in crc_shift_zeros::poly_step',

    # SP4 serve_ogg_window / find_page_start loop mutants.
    # Non-terminating (reported TIMEOUT, never a clean kill): `i -= 1` -> `i /= 1`
    # leaves the backward-scan index unchanged (infinite loop), and `pos += ...` ->
    # `pos *= ...` stays 0 forever once the first page is at offset 0. Like the SP2
    # tree.rs timeouts, these can only ever flag via the timeout budget. Each is the
    # sole `-=` / `+=` in its function, so anchored line-agnostically.
    'musefs-core/src/ogg_index\.rs:\d+:\d+: replace -= with /= in find_page_start',
    'musefs-core/src/ogg_index\.rs:\d+:\d+: replace \+= with \*= in serve_ogg_window',
    # Overlap-emit guards `if hs < he` / `if ps < pe`, `<`->`<=`: when the bound is
    # equal the extra branch emits an empty `[a..b]` slice / reads 0 payload bytes —
    # a no-op, so the served output is byte-identical (verified: the ogg tests and the
    # byte-identical proptest_read_fidelity pass with both mutations applied). They
    # were reported TIMEOUT under the parallel gate's load, not as a real hang. Pinned
    # by line:col — several `<` in this fn (the loop/length guards) ARE caught.
    'musefs-core/src/ogg_index\.rs:204:15: replace < with <= in serve_ogg_window',
    'musefs-core/src/ogg_index\.rs:213:15: replace < with <= in serve_ogg_window',
]
