# cargo-mutants workspace config.
#
# Crates / files out of scope for mutation testing, with the reason each is
# excluded (the in-scope crates mutate a hand-picked --file allowlist in
# scripts/mutants.sh; this list governs both that campaign and the per-PR
# --in-diff gate). See
# docs/superpowers/specs/2026-06/2026-06-10-mutants-fuse-convert-gating-design.md.
#
# musefs-fuse: only src/convert.rs is in scope — the portable, mutation-tested
# pure helpers (to_file_attr, assemble_dir_listing, cap_eff_has_sys_admin),
# killable by plain unit tests on the Linux runner. The rest is excluded:
#   - src/lib.rs: the Filesystem trait adapter + session/mount glue (its mutants
#     all survive plain `cargo test`), plus helpers whose only mutants are
#     unviable (errno, open_flags), equivalent (reply_errno selects only a log
#     level), or core-I/O (build_dir_listing takes &Musefs).
#   - src/platform/**: the logic-bearing parts are #[cfg(target_os = "macos")]
#     and uncoverable on the Linux mutation runner — the macOS code is cfg'd out
#     there so its mutants always survive, and its tests only compile on macOS.
#     Gating it needs a macOS mutation leg (deferred). NB: narrowing the glob to
#     specific files means any future top-level musefs-fuse/src/*.rs becomes
#     in-scope automatically — intended, but worth knowing.
#
# musefs-cli: parse_mount_config / From<CliMode> produce only unviable mutants;
# unmount_commands is the lone caught helper and is not worth un-excluding
# signal.rs's thread/exit() glue for. The `musefs` binary is a one-line
# entrypoint. Both fully excluded.
#
# musefs-latencyfs is NOT excluded here: it carries real logic (the inode map,
# latency table, attr mapping, passthrough op behavior), so it gets its own
# mutation leg in scripts/mutants.sh / mutants.yml that installs libfuse and runs
# the #[ignore]d mounted tests (`-- -- --include-ignored`). The fast per-PR
# `--in-diff` gate excludes it separately (it is mountless and can't kill its
# mutants); see .github/workflows/mutants.yml.
#
# musefs-core/src/metrics.rs is feature-gated instrumentation: its active impl is
# `#[cfg(feature = "metrics")]` and is only compiled (with its tests) under
# `--features metrics`. The per-PR `--in-diff` gate runs cargo-mutants without that
# feature, so the counter bodies aren't compiled and any mutation there is
# unobservable — reported MISSED yet unkillable in that config. The counters are a
# pure observability shim with no serving/correctness role and are covered
# functionally by the feature-gated tests in that file, so exclude them from
# mutation rather than carry permanently-surviving mutants.
exclude_globs = [
    "musefs-fuse/src/lib.rs",
    "musefs-fuse/src/platform/**",
    "musefs-cli/**",
    "musefs/**",
    "musefs-core/src/metrics.rs",
]

# Equivalent / unreachable mutants in the SP1 scan pipeline that no correctness
# test can kill (they alter performance or batching granularity, not observable
# results, or live in unreachable defensive branches). Documented per class.
# Anchored on file:line:col so only the proven-equivalent sites are suppressed;
# killable siblings (e.g. flac `|`->`&`, scan 871 `+`->`*`) stay in scope.
#
# Every entry carries a machine-checked `# guard:` tag on the line directly above
# it (`op=`/`fn=`/`rows=` for file:line:col anchors, `count=` for multi-site
# description anchors). scripts/check_mutant_anchors.py re-validates them against
# the live mutant set in CI so a `cargo fmt` line shift can't silently re-point an
# anchor onto a killable mutant. See the "Mutation testing" section at https://sohex.github.io/musefs/contributing/testing.html#mutation-testing before
# editing; run the guard locally after any change here.
exclude_re = [
    # musefs-format's sanctioned u64->usize helper: replacing its body with a
    # constant (`-> 0` / `-> 1`) is a MACHINE-KILLER, not an equivalent mutant.
    # The format parsers assign absolute walk positions through it
    # (`pos = usize_from(next)` in wav::walk_chunks, mp4's box walk, the ogg
    # page scan); a constant return pins the position forever while the loop
    # pushes a record per iteration — an allocation bomb that OOMs the HOST
    # (observed: 26.7G RSS + 11.5G swap killing a tmux session twice; two CI
    # runners died with "runner received a shutdown signal") faster than
    # cargo-mutants' test timeout can fire. The helper's correctness is pinned
    # instead by its unit test plus every slice/alloc consumer. musefs-db's
    # sibling helper stays IN scope: core uses it only for slice bounds, so its
    # constant-return mutants die by prompt panic (verified caught).
    'musefs-format/src/convert\.rs:\d+:\d+: replace usize_from -> usize',
    # wav walk_chunks chunk-advance `8u64 + size + (size & 1)`, the `8u64 + size`
    # operator (col 28): the SAME MACHINE-KILLER class as convert.rs above. `+`->`*`
    # zeroes the advance when size==0 (`8 * 0 + 0`), and `+`->`-` zeroes it when
    # size==8 (`8 - 8 + 0`) — both real inputs in the test corpus. A zero advance
    # freezes `pos` (next == pos passes the `next <= ceiling` guard) while the loop
    # `out.push`-es the same chunk every iteration: an unbounded allocation that OOMs
    # the runner before cargo-mutants' timeout fires (observed killing the in-diff CI
    # job). The advance's correctness is pinned functionally by
    # walk_chunks_advances_past_each_payload — a wrong advance lands off the next
    # header. The `size + (size & 1)` operator at :35 and the `& 1` at :43 cannot
    # zero the advance (min 8) and stay IN scope (caught by that same test).
    # guard: op="+" fn="walk_chunks" rows=2
    'musefs-format/src/wav\.rs:57:28:',
    # dirty_min_flip_ancestors (add-side walk) `id < introducing_id(child)`: the
    # `<`->`<=` boundary is unreachable-different. Equality needs the walked id to
    # BE the subtree's introducing id, which only a moved-in id can satisfy (pure
    # adds aren't in the tree, and ids are unique) — and a mover inside that
    # subtree always dirties the same parent on its removal-side walk first
    # (introducing-id chains are contiguous, so the walk cannot break early). The
    # dirty set — and hence the rebuild count — is identical. Anchored on the
    # description (not line:col) so `cargo fmt` can't silently retire it.
    'replace < with <= in VirtualTree::dirty_min_flip_ancestors',
    # Hang-class (timeout-only) mutants, per the SP3 non-terminating-loop
    # precedent. dirty_min_flip_ancestors walks parents until ROOT; ROOT is its
    # own parent, so inverting the boundary makes the d==ROOT entry spin forever
    # — the only observable is a hang. Every behavioral mutant in the walk is
    # killed by the apply_changes rebuild-count pins.
    'replace != with == in VirtualTree::dirty_min_flip_ancestors',
    # suffix_candidate const-return mutants break the progress invariant of the
    # ` (k)`-ranked candidate sequence: disambiguate's search loop assumes each
    # rank is a distinct key and spins forever on a constant. The FORMAT of the
    # candidates is pinned by the disambiguation and collision-gate tests; only
    # the un-rankable constant replacements are excluded.
    'replace suffix_candidate -> String with',
    # probe_body widen loop: `.max(want + 1)` is dominated — the bounded probers
    # only return `NeedMore{up_to}` with `up_to > want` (we widen precisely to a
    # block end past the prefix), so `up_to.min(probe_cap)` always wins the max and
    # the `want + 1` term is never selected. `+`->`-`/`*` are equivalent.
    # guard: op="+" fn="probe_body" rows=2
    'musefs-core/src/scan\.rs:653:31:',
    # probe_body post-loop fallback guard `(prefix.len() as u64) < probe_cap`: when
    # it differs, the only effect is a redundant re-read up to the probe cap that
    # feeds the same `probe_full` result. The >8-retry path that could diverge is
    # unreachable given the probers' exact (FLAC/MP3/WAV) / geometric (Ogg) NeedMore.
    # guard: op="<" fn="probe_body" rows=3
    'musefs-core/src/scan\.rs:660:30:',
    # probe_body WAV ceiling-fallback guard `file_len > MAX_PROBE_BYTES` (`>` at
    # :21): differs from `>=` only at file_len == MAX_PROBE_BYTES exactly, where the
    # whole file already fits within probe_cap — so `probe_full` parses it (valid)
    # or `locate_audio_at_ceiling` rejects it on the same off+len>file_len bound
    # (corrupt), giving the identical skip either way. The ceiling branch is never
    # the deciding path at the boundary, so the mutant is equivalent.
    # guard: op=">" fn="probe_body" rows=3
    'musefs-core/src/scan\.rs:671:21:',
    # probe_body oversize-skip diagnostic `file_len > MAX_PROBE_BYTES` (`>` at :17):
    # gates only a `log::warn!` (mirroring the M4A `MetadataTooLarge` warn). It has
    # no effect on the returned `Probed`/skip decision or any persisted state, so
    # every mutation of the condition is unobservable — a pure observability shim,
    # like the metrics counters above.
    # guard: op=">" fn="probe_body" rows=3
    'musefs-core/src/scan\.rs:676:17:',
    # log_mp4_oversize_drops is a pure observability shim: it emits a `log::warn!`
    # per oversized mp4 `covr` / `----` payload the format layer skipped before
    # materialization (#343) and returns nothing. With no log-capture harness in the
    # suite its emission is unobservable to any test, so `replace ... with ()` is
    # MISSED-yet-unkillable — the same class as the probe_body oversize-diag warn
    # above and the metrics counters. The drop DECISIONS it reports are pinned in
    # musefs-format (read_pictures_reporting / read_binary_tags_reporting tests).
    # guard: count=1
    'replace log_mp4_oversize_drops with \(\)',
    # run_pipeline sync_channel capacity `jobs * 2`: pure throughput/blocking knob;
    # the persisted track set is identical for any positive capacity.
    # guard: op="*" fn="run_pipeline" rows=2
    'musefs-core/src/scan\.rs:1395:46:',
    # run_pipeline flush cadence (batch_bytes accounting + the
    # `len >= BATCH_FILES || batch_bytes >= cap` flush triggers, both the try_recv
    # and the recv branch): the mid-loop threshold flush is belt-and-suspenders on
    # top of the flush-on-empty safety net + the final post-loop flush, so any
    # cadence mutation persists the identical track set. The win is fewer commits
    # (fsyncs), a performance property only observable via the `metrics`
    # instrumentation the in-diff gate does not build.
    # NB: line:col here (and for revalidate below) — `+=` and `>=`/`||` repeat in
    # run_pipeline (e.g. the killable `*scanned += 1` at 1306), so these cannot be
    # safely description-anchored. Re-verify these coordinates (via
    # `cargo mutants --list`) after any change that reformats scan.rs.
    # guard: op="+=" fn="run_pipeline" rows=2
    'musefs-core/src/scan\.rs:1526:29:',
    # guard: op=">=" fn="run_pipeline" rows=1
    'musefs-core/src/scan\.rs:1528:32:',
    # guard: op="||" fn="run_pipeline" rows=1
    'musefs-core/src/scan\.rs:1528:47:',
    # guard: op=">=" fn="run_pipeline" rows=1
    'musefs-core/src/scan\.rs:1528:62:',
    # guard: op="+=" fn="run_pipeline" rows=2
    'musefs-core/src/scan\.rs:1536:37:',
    # guard: op=">=" fn="run_pipeline" rows=1
    'musefs-core/src/scan\.rs:1538:40:',
    # guard: op="||" fn="run_pipeline" rows=1
    'musefs-core/src/scan\.rs:1538:55:',
    # guard: op=">=" fn="run_pipeline" rows=1
    'musefs-core/src/scan\.rs:1538:70:',
    # revalidate_with `skip_failed += 1`: unreachable defensive accounting.
    # collect_audio yields only existing regular files, so a just-collected file's
    # metadata()/canonicalize() fails solely under a TOCTOU race — not reachable
    # from a deterministic test. With skip_failed identically 0, the `failed =
    # scan.failed + skip_failed` sum is also insensitive to `+`->`-` (the `+`->`*`
    # variant IS caught, so only `-` is excluded here).
    # guard: op="+=" fn="revalidate_with" rows=2
    'musefs-core/src/scan\.rs:1666:29:',
    # guard: op="+=" fn="revalidate_with" rows=2
    'musefs-core/src/scan\.rs:1675:33:',
    # guard: op="+" fn="revalidate_with" rows=1
    'musefs-core/src/scan\.rs:1730:29: replace \+ with -',
    # Phase 2 ID3 binary tags: classify_binary_frame's POPM counter fold
    # `(a << 8) | b` -> `(a << 8) ^ b`. The accumulator is left-shifted by 8 before
    # each combine, so its low byte is always zero where `b` lands; `|` and `^` are
    # bit-for-bit identical for every input (same equivalence as the flac assembly
    # above). The `<<`->`>>` and `> 0` siblings in this fn ARE caught and stay in scope.
    'musefs-format/src/mp3\.rs:\d+:\d+: replace \| with \^ in classify_binary_frame',
    # synchsafe_decode's four ORed operands `u32::from(b[n] & 0x7F)` are each
    # shifted by 21/14/7/0 into NON-OVERLAPPING 7-bit windows of the 28-bit result,
    # so the operands are bit-disjoint and `|`/`^` agree for every input (same
    # equivalence class as classify_binary_frame above). Description-anchored so
    # `cargo fmt` line drift can't silently retire it.
    # guard: count=3
    'replace \| with \^ in synchsafe_decode',
    # fuzz_check fixtures::flac_block header byte
    # `(if is_last { 0x80 } else { 0 }) | (block_type & 0x7F)` -> `^`: the right
    # operand is masked to bits 0-6 and the left is bit 7 or zero, so the operands
    # are bit-disjoint and `|`/`^` agree for every input (mutation-eligible since
    # the #139 consolidation moved the fixture from tests/ into src/fuzz_check.rs).
    # The `|`->`&` sibling IS caught and stays in scope.
    'musefs-format/src/fuzz_check\.rs:\d+:\d+: replace \| with \^ in fixtures::flac_block',

    # fuzz_check fixtures::mp3_with_binary_frame::synchsafe ID3v2.4 size encoder
    # `(v >> 21|14|7) & 0x7F` -> `<<`: every size this fixture encodes is < 128
    # (GEOB body = 27 B, frame = 37 B), so only the low 7-bit byte is ever non-zero
    # and the three high bytes are 0 regardless of shift direction — `>>` and `<<`
    # produce identical output for every input the fixture feeds in. Equivalent
    # mutants, description-anchored so `cargo fmt` line drift can't retire them. The
    # `& 0x7F` masks and the low-byte `v & 0x7F` stay in scope (those mutants are
    # caught).
    # guard: count=3
    'musefs-format/src/fuzz_check\.rs:\d+:\d+: replace >> with << in fixtures::mp3_with_binary_frame::synchsafe',

    # SP2 incremental tree refresh — equivalent mutants in apply_changes & friends.
    # The whole design contract is "the incrementally-mutated tree is byte-identical
    # to a full VirtualTree::build_with over the same final track set" (enforced by
    # the property oracle + a debug_assert in poll_refresh). Several mutations only
    # change HOW MUCH work the in-place path does — never its output — so no
    # black-box test over the tree can distinguish them, and the in-diff gate builds
    # without the `metrics` feature, so there is no counter to observe the path
    # taken either. Anchored on file:line:col so killable siblings stay in scope.
    #
    # force_apply_failure_for_test -> (): the no-op leaves force_apply_fail false, so
    # poll_refresh runs the incremental path instead of the injected full-rebuild
    # fallback. Both produce an identical tree (same nodes AND same inodes — the
    # allocator interns by path and never recycles), so the only difference is an
    # eprintln on stderr. The fallback's build_with is itself directly tested; this
    # injection point exists only to drive that branch, with nothing observable to
    # assert in this config.
    'replace Musefs::force_apply_failure_for_test with \(\)',
    # apply_changes path-stable guard `&self.path_of(ino) == new_path` -> false: a
    # `changed` id whose rendered path is unchanged would be treated as a move
    # (remove + re-insert at the same path) instead of a no-op. Re-interning the same
    # path yields the same inode and rebuild_subtree re-canonicalizes the parent, so
    # the resulting tree is identical — a pure short-circuit optimization.
    'replace match guard .* with false in VirtualTree::apply_changes',
    # (The add-side/remove-side dirty-propagation walks formerly inline in
    # apply_changes now live in dirty_min_flip_ancestors; their equivalent and
    # hang-class mutants are covered by the description-anchored
    # dirty_min_flip_ancestors entries at the top of this list.)
    #
    # Non-terminating mutant (reported as TIMEOUT, never a clean kill): turns a
    # bounded upward walk into an infinite loop, because the root is its own parent
    # (root.parent == ROOT) and this guard is exactly what stops the walk at root.
    # cargo-mutants can only ever flag it via the 22s auto-timeout; it cannot be
    # "caught" by an assertion, so it is excluded rather than left to flake the
    # gate on the timeout budget.
    #
    # ancestor_in's loop terminator `cur == Self::ROOT` -> `!=`: the walk never breaks
    # at root (root.parent == root), so a node with no ancestor in the set loops
    # forever instead of returning false.
    'replace == with != in VirtualTree::ancestor_in',

    # SP4 crc_shift_zeros — equivalent mutants inherent to the loop/matrix hybrid.
    # crc_shift_zeros has two code paths (a per-step loop and a GF(2) matrix-power)
    # that compute the IDENTICAL value; the differential test pins the result, but no
    # test can distinguish the internal dispatch/optimization that these mutate.
    # Anchored on operator+function (line-agnostic) since each is the sole such site.
    #
    # `if n == 0 || crc == 0 { return crc }` early return, `||`->`&&`: a pure
    # short-circuit. For n==0 the loop/matrix run 0 steps and return crc unchanged;
    # for crc==0 they propagate 0. So skipping (or not) the early return is the same.
    'musefs-format/src/ogg/crc\.rs:\d+:\d+: replace \|\| with && in crc_shift_zeros',
    # path-dispatch threshold `if n < MATRIX_THRESHOLD`: the loop and the matrix
    # return the same CRC for every n, so `<`->`==`/`>`/`<=` only changes which
    # equivalent path runs, never the output. (Sole `<` in crc_shift_zeros.)
    'musefs-format/src/ogg/crc\.rs:\d+:\d+: replace < with (==|>|<=) in crc_shift_zeros',
    # poly_step `(p << 8) ^ TABLE[p >> 24]`, `^`->`|`: poly_step is only ever applied
    # to single-bit basis vectors `1 << (31-i)`. For those, `p << 8` is 0 whenever
    # `TABLE[p >> 24]` is non-zero (i < 8) and `TABLE[p >> 24]` is 0 (== TABLE[0])
    # whenever `p << 8` is non-zero (i >= 8) — the two operands are always disjoint,
    # so `^` and `|` are bit-identical, and the built matrix is unchanged. (The
    # linear-path `^` elsewhere in crc_shift_zeros IS caught and stays in scope.)
    'musefs-format/src/ogg/crc\.rs:\d+:\d+: replace \^ with \| in crc_shift_zeros::poly_step',
    # matrix-power loop terminator `while exp > 0`, `>`->`>=`: `exp` is usize, so
    # `>= 0` is always true and the loop never exits — non-terminating (TIMEOUT,
    # never a clean kill). It is the sole `>` in crc_shift_zeros (the `p >> 24` is a
    # shift), so anchored line-agnostically.
    'musefs-format/src/ogg/crc\.rs:\d+:\d+: replace > with >= in crc_shift_zeros',

    # SP4 find_page_start loop mutant. Non-terminating (reported TIMEOUT, never a
    # clean kill): `i -= 1` -> `i /= 1` leaves the backward-scan index unchanged
    # (infinite loop). Like the SP2 tree.rs timeouts, it can only ever flag via the
    # timeout budget. The sole `-=` in its function, so anchored line-agnostically.
    'musefs-core/src/ogg_index\.rs:\d+:\d+: replace -= with /= in find_page_start',
    # Overlap-emit guards `if hs < he` / `if ps < pe`, `<`->`<=`: when the bound is
    # equal the extra branch emits an empty `[a..b]` slice / reads 0 payload bytes —
    # a no-op, so the served output is byte-identical (verified: the ogg tests and the
    # byte-identical proptest_read_fidelity pass with both mutations applied). They
    # were reported TIMEOUT under the parallel gate's load, not as a real hang. Pinned
    # by line:col — several `<` in this fn (the loop/length guards) ARE caught.
    # guard: op="<" fn="serve_ogg_window" rows=1
    'musefs-core/src/ogg_index\.rs:252:15: replace < with <= in serve_ogg_window',
    # guard: op="<" fn="serve_ogg_window" rows=1
    'musefs-core/src/ogg_index\.rs:261:15: replace < with <= in serve_ogg_window',

    # Phase 4 poll debounce (#89) — equivalent `<`->`<=` on the two wall-clock
    # gates (`last_poll.elapsed() < poll_interval`, `last_failed.elapsed() <
    # refresh_retry_backoff`), now shared by `poll_due` (advisory pre-check) and
    # `poll_refresh_notify` (authoritative) via the `poll_debounced` helper. The
    # operators differ only when `Instant::elapsed()` equals the bound at the exact
    # nanosecond it is sampled — a measure-zero boundary no deterministic test can
    # construct: the `*_for_test` hooks backdate the stamp by exactly the bound, but
    # time advances before the comparison runs, so elapsed() is already strictly
    # greater under both operators. The `<`->`>`/`==` variants ARE caught and stay
    # in scope; anchored on operator+function since both `<` in the fn are this
    # class.
    # guard: count=2
    'replace < with <= in Musefs::poll_debounced',

    # CACHE_ESTIMATED_ITEMS const arithmetic — equivalent mutant. This is the
    # `estimated_items_capacity` hint passed to Cache::with_weighter; it sizes
    # quick_cache's internal hash map but is not a bound and has no effect on
    # eviction, correctness, or any observable public-API behavior. The `/`→`%`
    # variant yields 0 (64 MiB is 4 KiB-aligned), `/`→`*` yields ~256 GiB;
    # quick_cache accepts any usize. (cargo-mutants DOES mutate const
    # initializers — the equivalence rests on unobservability, not on the
    # const being out of reach.)
    # guard: op="/" fn="" rows=2
    'musefs-core/src/reader\.rs:76:60: replace / with [%*]',
    # read_segments_into splice loop's overlap guard `if ov_start < ov_end`,
    # `<`->`<=`: the same equivalence class as serve_ogg_window's overlap-emit
    # guards above. When the bound is equal the overlap is empty (n = ov_end -
    # ov_start = 0), so every match arm extends by an empty slice / reads 0 payload
    # bytes and the spliced output is byte-identical (the byte-fidelity proptest and
    # the read_at tests pass with the mutation applied). The `<`->`==`/`>` siblings
    # flip real behavior and ARE caught; the sole `<` in this fn, so
    # description-anchored against `cargo fmt` line drift.
    'replace < with <= in read_segments_into',

    # wav walk_chunks advance guard `next <= ceiling as u64` -> `true`: forcing
    # the guard true sets `pos = next` even when `next > ceiling`, but the loop's
    # `while pos + 8 <= ceiling` test is then immediately false (next can't wrap —
    # checked_add guards overflow and usize_from doesn't truncate on 64-bit), so the
    # walk ends on the next iteration with the IDENTICAL output Vec the original's
    # `break` produced (the chunk header was pushed before the advance). Equivalent;
    # the in-file note in wav.rs's test module documents the hand-apply confirmation.
    # (`ceiling = min(form_end, buf.len())` clamps the walk to the declared RIFF form.)
    # The sole match guard in walk_chunks, so description-anchored.
    'replace match guard next <= ceiling as u64 with true in walk_chunks',

    # fuzz_check fixtures::wav RIFF-size sum `4 + fmt_chunk.len() + data_chunk.len()`
    # `+`->`*`: the computed `riff_size` is written into the RIFF header's size field,
    # but NO in-workspace WAV parser reads it — `riff_wave_start` only checks the
    # "RIFF"/"WAVE" magic (bytes 0-3 / 8-11, never the 4-7 size word) and `walk_chunks`
    # ignores it entirely, walking chunk-to-chunk by each chunk's own declared length.
    # So any value the mutated sum produces is unobservable through the format API the
    # in-diff gate builds. The two `+` in fixtures::wav are this one expression; both
    # `+` elsewhere are absent (`samples.len() * 2` is `*`), so description-anchored.
    # guard: count=2
    'replace \+ with \* in fixtures::wav',

    # truncate_bytes char-boundary back-off loop `while end > 0 && ...`, `>`->`>=`:
    # equivalent. `end` is usize so `end >= 0` is always true, but byte 0 is always a
    # char boundary, so `!s.is_char_boundary(0)` is false and the `&&` short-circuits
    # the loop to the same exit — identical `&s[..end]`. The sole `>` in truncate_bytes,
    # so operator+function-anchored.
    'replace > with >= in truncate_bytes',
    # truncate_bytes back-off step `end -= 1` -> `end /= 1`: `/= 1` leaves `end`
    # unchanged, so once the loop is entered on a non-boundary index it never advances
    # — non-terminating (TIMEOUT-only, never a clean kill), the SP3 hang-class
    # precedent. The decrement's correctness is pinned by the UTF-8-boundary truncation
    # tests; only the un-steppable `/=` replacement is excluded. Sole `-=` in the fn.
    'replace -= with /= in truncate_bytes',
    # truncate_component empty-string const returns (`Cow::Borrowed("")` /
    # `Cow::Owned("".to_owned())`): hang-class. An empty component is unreachable in
    # production — callers pass non-empty `/`-split path components and the fn never
    # shrinks a non-empty name to "" — and forcing every component empty makes a
    # rebuild test spin past the timeout (reported TIMEOUT, never a clean kill). The
    # NON-empty const returns (`"xyzzy"`) stay in scope and ARE caught, so the fn's real
    # behavior is still pinned; only the unreachable empty returns are excluded. (`.`
    # stands in for the `'` in `Cow<'_, str>`, which a TOML literal string can't hold.)
    'replace truncate_component -> Cow<._, str> with Cow::Borrowed\(""\)',
    'replace truncate_component -> Cow<._, str> with Cow::Owned\(""\.to_owned\(\)\)',

    # #305 folded-inode allocator — hang-class (TIMEOUT-only) mutants, the SP3
    # non-terminating-loop precedent. InodeAllocator::key() transforms a path into
    # the inode map key (case-folded on folded mounts, identity otherwise).
    # Replacing its body with ANY constant — empty or "xyzzy", borrowed or owned —
    # makes every path intern to one key, so every node collapses onto a single
    # inode and becomes its own parent; path_of's `while cur != ROOT` walk then
    # spins forever (observed canceling the in-diff CI job). All four const-returns
    # share site 52:9 (one distinct site). key()'s real behavior is pinned
    # functionally: the fold-vs-identity branch is exercised by
    # folded_dir_recase_keeps_survivor_inode (folded) and
    # case_sensitive_keeps_both_dirs_separate (identity).
    'musefs-core/src/tree\.rs:\d+:\d+: replace InodeAllocator::key -> Cow<.a, str> with',
    # intern const-returns `-> 0` / `-> 1`: same hang-class. A constant inode for
    # every path collides all nodes (inode 0, or ROOT for 1) into a self-parenting
    # cycle, so path_of loops forever. intern's real contract — a fresh inode per
    # new path, reuse on repeat — is pinned by
    # build_with_keeps_inodes_stable_across_rebuilds and the prune_retired tests.
    # Both const-returns share site 62:9 (one site). The `+= -> -=` sibling at
    # 67:19 underflows `next` to a panic and IS caught, so it stays in scope.
    'musefs-core/src/tree\.rs:\d+:\d+: replace InodeAllocator::intern -> u64 with [01]',
    # intern next-bump `self.next += 1` -> `*= 1`: leaves `next` pinned at 2, so
    # every new path interns to inode 2 — the same self-parenting hang. The
    # `+= -> -=` variant at this site underflows to a panic and IS caught; only the
    # no-op `*=` is excluded.
    'musefs-core/src/tree\.rs:\d+:\d+: replace \+= with \*= in InodeAllocator::intern',

    # Db::with_raw_conn is #[cfg(feature = "fuzzing")] — a test/fuzz-only raw
    # rusqlite-connection escape hatch enabled solely by the out-of-workspace fuzz
    # crate. The per-PR --in-diff gate runs cargo-mutants without that feature, so
    # the body is cfg'd out and any mutation there is unobservable — reported
    # MISSED yet unkillable in that config, the same class as the metrics counters
    # in exclude_globs above. It has no serving/correctness role and is covered
    # functionally by the fuzzing-gated accessor test in the same file.
    # guard: count=1
    'musefs-db/src/lib\.rs:\d+:\d+: replace Db<M>::with_raw_conn -> R with Default::default\(\)',

    # --- #255 backing read-ahead pool: hang-class + boundary-equivalent ---
    # The read-ahead pool is a transparent cache: these mutants change cache
    # accounting/eviction internals, never the bytes served (the byte-differential
    # tests guarantee correctness). They split into two unkillable classes.
    #
    # Hang-class (TIMEOUT-only, never a clean kill — these CANCEL the in-diff CI
    # job, the SP3 non-terminating-loop precedent): `per_stream_cap` returning 0
    # (or inverting its `budget == 0` guard so every live pool reports cap 0) caps
    # every window at 0, and `evict_one_coldest` reporting `Some`/widening its
    # `freed > 0` guard claims progress it didn't make — either way the
    # evict-until-room loop in `permitted_window` spins forever. Each is the sole
    # such site in its fn, so operator+function-anchored (line-agnostic).
    'replace ReadAheadPool::per_stream_cap -> u64 with 0',
    'replace == with != in ReadAheadPool::per_stream_cap',
    'replace ReadAheadPool::evict_one_coldest -> Option<u64> with Some\(0\)',
    'replace ReadAheadPool::evict_one_coldest -> Option<u64> with Some\(1\)',
    'replace > with (==|>=) in ReadAheadPool::evict_one_coldest',
    #
    # Boundary-equivalent guards: at the `==` boundary both branches do the same
    # no-op (`fetch_sub(0)`, `add(0)`, or `window = cap`), so charged total and
    # served bytes are identical. The NON-boundary mutations of these same
    # operators (e.g. `> with ==`/`< with >`) ARE caught by the reconcile-accounting,
    # read-then-release-leak, and set_cap-clamp tests. Sole site per fn.
    'replace > with >= in ReadAheadPool::deregister',
    'replace > with >= in ReadAheadPool::reconcile',
    'replace < with <= in ReadAheadPool::reconcile',
    'replace > with >= in ReadAhead::set_cap',
    #
    # Phase-2 prefetch ring size (`depth + 1`), off by default and best-effort: a
    # wrong ring size only changes how many speculative windows are retained, never
    # the served bytes. #429 moved it from serve_backing into read_exact_at (sizing
    # the ring under the read lock); the fn's other two `+` are the observable fills
    # counters and stay killable, so this one is pinned by coordinate, not by fn.
    # guard: op="+" fn="BackingReader<'a>::read_exact_at" rows=2
    'musefs-core/src/readahead\.rs:611:68:',
    #
    # More hang-class (TIMEOUT-only, CANCEL the in-diff job): `len() -> 1` /
    # `clear() -> 1` force a constant resident size, so `evict_one_coldest` keeps
    # reporting a non-zero freed amount it never actually freed and
    # `permitted_window`'s evict loop never terminates. The `-> 0` variants ARE
    # caught (the len/clear-sum test). Sole returns.
    'replace ReadAhead::len -> u64 with 1',
    'replace ReadAhead::clear -> u64 with 1',
    # insert_window eviction-filter arithmetic `w.start + w.bytes.len() <= frontier`,
    # `+`->`*`: only changes WHICH cached window is dropped in a contrived spanning
    # case, never the served bytes (the byte-differential tests pin those) — cache
    # eviction policy, not correctness. The `<=`->`>` at the same site IS caught by
    # the ring-trim test. Sole `+` in insert_window.
    'replace \+ with \* in ReadAhead::insert_window',
    # PrefetchWorkers::request -> (): drops the speculative job instead of queuing
    # it. Phase-2 is opt-in and best-effort — a dropped prefetch just means a later
    # synchronous fill, identical served bytes. Sole site.
    'replace PrefetchWorkers::request with \(\)',
    #
    # musefs-core facade refresh single-flight guard (#444/#445 module split moved
    # this into facade/refresh.rs, which put it in the in-diff gate's scope for the
    # first time). RefreshGuard::drop resets the `refreshing` flag; replacing its
    # body with () leaves `refreshing` stuck `true` after the first rebuild, so
    # `refresh_for_test` — which UNIQUELY blocks until it owns the gate (spins on
    # `compare_exchange`) rather than bailing like the production poll path — spins
    # forever and hangs the test binary. TIMEOUT-only, and it CANCELS the in-diff job,
    # the same hang-class as the InodeAllocator / dirty_min_flip_ancestors / read-ahead
    # exclusions above. The reset's correctness is still pinned functionally:
    # facade.rs's `failed_refresh_retries_after_backoff_not_every_call` asserts
    # `poll_refresh` surfaces the read error, which the stuck gate makes impossible
    # (the CAS bails first) — that assertion does fail under the mutation, it just
    # can't be observed before the sibling stress test hangs the binary. Sole site.
    # guard: count=1
    'replace <impl Drop for RefreshGuard.*::drop with \(\)',

    # #464 backing-file checksums — ingest_unit retarget path equivalents.
    #
    # TrackSink::track_exists_at -> Ok(false), for BOTH the &Db and the
    # &mut BulkWriter impls: equivalent. ingest_unit calls track_exists_at twice and
    # both are pure optimization/defense. The known-path short-circuit (the function's
    # first `if`) only avoids the fingerprint lookup on an in-place re-scan; forced
    # false, that re-scan just takes the refind path and falls through to the IDENTICAL
    # upsert (its own row is filtered out by the copy-vs-move metadata filter, since its
    # path still exists). The destination-occupied guard (`!w.track_exists_at` in the
    # retarget `if`) only fires on a contrived input where the move destination already
    # has a row; forced false there it would attempt a retarget onto an occupied path,
    # which can only ever error on the UNIQUE(backing_path) constraint — never corrupt
    # state. Neither is reachable as a corrupting divergence from a correctness test.
    # The `Ok(true)` siblings at these sites stay IN scope (killed by
    # ingest_unit_db_path_retargets_orphan / the retarget integration tests).
    # guard: count=1
    'replace <impl TrackSink for &Db>::track_exists_at -> musefs_db::Result<bool> with Ok\(false\)',
    # guard: count=1
    'replace <impl TrackSink for &mut musefs_db::BulkWriter<._>>::track_exists_at -> musefs_db::Result<bool> with Ok\(false\)',
    #
    # ingest_unit log-only branches: both gate ONLY a `log::warn!` with no effect on
    # persisted state, and the suite has no log-capture harness (same class as the
    # probe_body oversize-diag warn and log_mp4_oversize_drops above).
    #
    # `candidates.len() > 1` ambiguity warn: every operator variant only changes
    # whether the warn fires; the fresh-insert fall-through is identical (the `== 1`
    # retarget arm above already handled the unique-candidate case). Sole `>` in
    # ingest_unit, so description-anchored against `cargo fmt` line drift.
    # guard: count=1
    'replace > with (==|<|>=) in ingest_unit',
    # `if !confirmed` warn `delete !`: dropping the `!` only flips whether the warn
    # fires; the subsequent fresh-insert path is unchanged. This `delete !` shares its
    # description with the KILLABLE `!w.track_exists_at(...)` delete (caught by
    # ingest_unit_db_path_retargets_orphan), so a plain description anchor would mask
    # that sibling. Pinned by COLUMN (`:\d+:16:`) instead — line-drift-tolerant like
    # the hang-class `:\d+:\d+:` entries, but column-specific so only the log-only
    # delete at col 16 is suppressed; the killable one at col 29 stays IN scope. The
    # `:\d+:16:` form is classified as a description (count) anchor, not a line:col
    # anchor (the literal-coord detector needs `:digits:digits:`), so count=1 applies.
    # guard: count=1
    'musefs-core/src/scan\.rs:\d+:16: delete ! in ingest_unit',

    # --- musefs-latencyfs: bench-only passthrough FUSE adapter survivors ---
    # The bench harness's logic-bearing mutants (the inode map, latency table,
    # attr mapping, the readdir kind-classification and parent-inode synthesis,
    # the read splice) ARE killed by the mounted `#[ignore]`d tests run in the
    # crate's own mutation leg (`-- -- --include-ignored`, scripts/mutants.sh).
    # The entries below are the residue: the thin `fuser::Filesystem` reply
    # plumbing — the exact class `musefs-fuse/src/lib.rs` is excluded wholesale
    # for (exclude_globs above). They split into two unkillable kinds.
    #
    # Hang-class (TIMEOUT-only, the SP3 non-terminating-loop precedent): these
    # never produce a clean kill, only flag on the timeout budget, and OOM/cancel
    # the leg rather than fail an assertion.
    #
    # usize_from const-return (`-> 0` / `-> 1`, one site): the crate's sanctioned
    # u64->usize cast, used for `read`'s buffer size and readdir's skip offset.
    # The exact MACHINE-KILLER class as musefs-format's convert.rs usize_from
    # above — a constant size makes `read` return 0/1 bytes forever so the mounted
    # reader loops. Pinned functionally by every read/readdir consumer.
    'musefs-latencyfs/src/lib\.rs:\d+:\d+: replace usize_from -> usize',
    # readdir entry-cookie `(i + 1)` -> `(i * 1)`: the kernel re-requests the
    # same offset forever (the cookie never advances), an infinite readdir. The
    # `+`->`-` sibling underflows to a panic at i==0 and IS caught. Sole `+` in
    # readdir, so description-anchored.
    'replace \+ with \* in <impl fuser::Filesystem for PassthroughFs>::readdir',
    # read -> (): drops the `ReplyData` without responding, so the `read()`
    # syscall blocks forever waiting on the FUSE reply. The read I/O itself
    # (buffer fill, offset splice) is pinned by reads_a_file_through_the_mount;
    # only the whole-body drop hangs.
    'replace <impl fuser::Filesystem for PassthroughFs>::read with \(\)',
    #
    # Unwaited-ack / unobservable thin-adapter (MISSED): replacing these bodies
    # with () drops a reply the kernel never blocks on (release/releasedir are
    # fire-and-forget) or skips state with no observable effect — so a clean
    # mounted run can't distinguish them, and any test that DID invoke them on a
    # waited reply (access/flush/fsyncdir) would hang on the dropped reply rather
    # than fail, i.e. hang-class again.
    #
    # releasedir/access: bodies are literally just `reply.ok()` — pure acks.
    'replace <impl fuser::Filesystem for PassthroughFs>::releasedir with \(\)',
    'replace <impl fuser::Filesystem for PassthroughFs>::access with \(\)',
    # flush: only skips a `nap()` (latency injection) before the ack — timing,
    # not correctness.
    'replace <impl fuser::Filesystem for PassthroughFs>::flush with \(\)',
    # release: leaks one entry in the `handles` map (no accessor exposes it and
    # the bench never exhausts fds), otherwise an unwaited ack.
    'replace <impl fuser::Filesystem for PassthroughFs>::release with \(\)',
    # fsyncdir: increments the `fsyncs` counter, but it shares that counter with
    # `fsync` (which dominates every fsync-counting test, keeping it `> 0`), and
    # isolating a directory fsync would hang on the dropped reply. The counter's
    # real contract is pinned by the fsync tests.
    'replace <impl fuser::Filesystem for PassthroughFs>::fsyncdir with \(\)',

    # ── Campaign #266 findings ──────────────────────────────────────────────
    # Hang-class (non-terminating, TIMEOUT-only) advance/loop freezes and one
    # allocation bomb, plus equivalent boundary/capacity mutants. The 9 genuinely
    # killable survivors the same campaign found got TESTS instead of exclusions.

    # VirtualTree::disambiguate candidate search assumes each ` (k)`-ranked
    # candidate is a distinct, eventually-free key. Forcing `taken` always-true, or
    # dropping the `!` that selects the free branch, spins the search forever
    # (TIMEOUT-only) — the suffix_candidate / ancestor_in family. The
    # `taken -> false` sibling IS caught and stays in scope.
    'replace VirtualTree::taken -> bool with true',
    # The `!` at col 16 (not the sibling at col 12, which IS caught); pinned by
    # column like the ingest_unit `delete !` above. `delete` has no operator, so a
    # line:col guard can't apply — column-anchored count instead.
    # guard: count=1
    'musefs-core/src/tree\.rs:\d+:16: delete ! in VirtualTree::disambiguate',
    # fold (case-fold) and join_path (node-path builder) const-returns: hang-class,
    # the InodeAllocator::key precedent. A constant fold/path collapses every node
    # onto one key, so path_of's `while cur != ROOT` walk self-loops forever. Real
    # behavior is pinned by the rebuild / inode-stability tests. One site each (two
    # const-return mutants).
    'musefs-core/src/tree\.rs:\d+:\d+: replace fold -> String with',
    'musefs-core/src/tree\.rs:\d+:\d+: replace join_path -> String with',

    # mp4 box-walk advance freezes (hang-class, the wav walk_chunks precedent).
    # read_structure_from's `pos += total` and BoxRef::end's `start + total_len`
    # (or a constant `end`) pin the seeking walk's position forever while it
    # re-reads the same box. The `+= -=` / `+ -` siblings underflow to a panic and
    # ARE caught. One site each.
    'musefs-format/src/mp4\.rs:\d+:\d+: replace \+= with \*= in read_structure_from',
    'musefs-format/src/mp4\.rs:\d+:\d+: replace \+ with \* in BoxRef::end',
    'musefs-format/src/mp4\.rs:\d+:\d+: replace BoxRef::end -> usize with [01]',
    # read_tags' integer-atom decode assembles a big-endian value byte by byte:
    # `n = (n << 8) | u64::from(b)`. After each `<< 8` the low byte of `n` is
    # zero where `b` lands, so `|` and `^` are bit-for-bit identical for every
    # input (same equivalence class as classify_binary_frame / synchsafe_decode).
    # The `<<`->`>>` sibling IS caught (bpm 300 = [1,44] decodes to 44, not 300).
    'musefs-format/src/mp4\.rs:\d+:\d+: replace \| with \^ in read_tags',

    # Ogg page lacer/reader advance freezes — hang-class plus the #266 OOM bomb.
    # total_len() -> 0, the `lace_pos < laces.len()` loop bounds, and the
    # `lace_pos += seg_count` / `+= chunk` advances each pin a page-walk index so
    # the loop never terminates. lace_packet / lace_chunks_to_segments spin CPU-
    # bound (TIMEOUT); read_packets's `pos += total_len` is the ALLOCATION BOMB: a
    # continued page-0 packet makes `cur.extend_from_slice` grow without bound,
    # OOMing the runner before the timeout fires (observed canceling shard 25/27 of
    # campaign #266). The `+= -=` / `-> 1` siblings underflow-panic / still advance
    # and ARE caught. One site each.
    'musefs-format/src/ogg/page\.rs:\d+:\d+: replace PageHeader::total_len -> usize with 0',
    'musefs-format/src/ogg/page\.rs:\d+:\d+: replace < with (<=|==) in lace_packet',
    'musefs-format/src/ogg/page\.rs:\d+:\d+: replace < with (<=|==) in lace_chunks_to_segments',
    # The lace_pos / pos advances specifically (cols pinned): the sibling
    # `payload_pos`/`pages`/`seq`/`seg` advances at adjacent lines do not gate loop
    # termination and ARE caught.
    # guard: op="+=" fn="lace_packet" rows=1
    'musefs-format/src/ogg/page\.rs:124:18: replace \+= with \*= in lace_packet',
    # guard: op="+=" fn="lace_chunks_to_segments" rows=1
    'musefs-format/src/ogg/page\.rs:351:18: replace \+= with \*= in lace_chunks_to_segments',
    # guard: op="+=" fn="read_packets" rows=1
    'musefs-format/src/ogg/page\.rs:189:13: replace \+= with \*= in read_packets',

    # Equivalent mutants from #266.
    # push_block_header `(if is_last {0x80} else {0}) | (block_type & 0x7F)`,
    # `|`->`^`: bit-disjoint operands (bit 7 vs bits 0-6), so `|`/`^` are identical
    # — the fixtures::flac_block equivalence above.
    'musefs-format/src/flac\.rs:\d+:\d+: replace \| with \^ in push_block_header',
    # parse_picture_block mime/desc length-bound guards `mime_end > body.len()` /
    # `desc_end > body.len()`, `>`->`>=`: at the boundary (a field ending exactly at
    # body end) the original proceeds and the next field read goes out of bounds ->
    # Malformed, the same error `>=` returns directly. The data_end guard below them
    # IS behavioral (a picture whose data fills the body exactly is valid) and stays
    # IN scope, so these two are pinned by line:col.
    # guard: op=">" fn="parse_picture_block" rows=1
    'musefs-format/src/flac\.rs:475:17: replace > with >= in parse_picture_block',
    # guard: op=">" fn="parse_picture_block" rows=1
    'musefs-format/src/flac\.rs:483:17: replace > with >= in parse_picture_block',
    # lace_chunks_to_segments `header_len = 27 + seg_count`, `+`->`*`: header_len
    # only sizes a `Vec::with_capacity` hint; the header is built by `extend`, so
    # any capacity is behavior-identical (the CACHE_ESTIMATED_ITEMS precedent). The
    # `lace_pos + seg_count` slice `+` elsewhere IS caught, so pinned by line:col.
    # guard: op="+" fn="lace_chunks_to_segments" rows=1
    'musefs-format/src/ogg/page\.rs:332:29: replace \+ with \* in lace_chunks_to_segments',
    # crc_feed_payload / emit_segments overlap guards `if os < oe`, `<`->`<=`: at
    # os==oe the overlap is empty, so the branch folds a zero-length slice / reads 0
    # art bytes — byte-identical CRC and segments (the serve_ogg_window empty-overlap
    # equivalence). One `<` per fn, so description-anchored.
    'musefs-format/src/ogg/page\.rs:\d+:\d+: replace < with <= in crc_feed_payload',
    'musefs-format/src/ogg/page\.rs:\d+:\d+: replace < with <= in emit_segments',
]
