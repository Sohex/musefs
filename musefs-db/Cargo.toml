[package]
name = "musefs-db"
description = "SQLite store and schema for musefs (tracks, tags, content-addressed art)."
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true

[dependencies]
rusqlite = { version = "0.40", features = ["bundled", "blob"] }
sha2 = "0.11"
thiserror = "2"

[features]
# Test-only: gates `Default` impls (Db + model structs) so cargo-mutants'
# `Ok(Default::default())` mutants compile. Named after the activity that needs
# it, mirroring musefs-format's `fuzzing` feature. Not for production use.
mutants = []

[dev-dependencies]
tempfile = "3"

[lints]
workspace = true
